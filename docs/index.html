<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>股票追蹤風險儀表板</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Stock Risk Dashboard</p>
        <h1>股票追蹤風險儀表板</h1>
        <p id="generatedAt" class="muted">讀取資料中...</p>
      </div>
      <div class="header-actions">
        <button id="refreshButton" class="icon-button" type="button" title="重新整理資料">↻</button>
      </div>
    </header>

    <main>
      <section id="summaryCards" class="summary-grid" aria-label="投資組合總覽"></section>

      <section class="toolbar" aria-label="篩選與搜尋">
        <div class="search-wrap">
          <label for="searchInput">搜尋股票</label>
          <input id="searchInput" type="search" placeholder="輸入代號或名稱，例如 2382 / 廣達" />
        </div>
        <div class="filters" aria-label="狀態篩選">
          <button class="chip active" data-filter="全部" type="button">全部</button>
          <button class="chip" data-filter="保留" type="button">保留</button>
          <button class="chip" data-filter="觀察" type="button">觀察</button>
          <button class="chip" data-filter="減碼警訊" type="button">減碼警訊</button>
          <button class="chip" data-filter="出場警訊" type="button">出場警訊</button>
          <button class="chip" data-filter="人工確認" type="button">需要人工確認</button>
        </div>
      </section>

      <section class="desktop-panel" aria-label="桌機版股票表格">
        <div class="table-tools">
          <h2>追蹤清單</h2>
          <button id="sortScoreButton" class="secondary-button" type="button">總分高到低</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th class="sticky-col code-col">代號</th>
                <th class="sticky-col name-col">名稱</th>
                <th>投資分類</th>
                <th>最新價格</th>
                <th>損益率</th>
                <th>總分</th>
                <th>狀態</th>
                <th>主要警訊摘要</th>
                <th>人工確認</th>
                <th>更新日期</th>
                <th>詳情</th>
              </tr>
            </thead>
            <tbody id="stockTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="mobileCards" class="mobile-list" aria-label="手機版股票卡片"></section>
    </main>

    <dialog id="detailDialog" class="detail-dialog">
      <div class="dialog-head">
        <div>
          <p id="dialogCode" class="eyebrow"></p>
          <h2 id="dialogTitle"></h2>
        </div>
        <button id="closeDialog" class="icon-button" type="button" title="關閉">×</button>
      </div>
      <div id="dialogContent"></div>
    </dialog>

    <footer>
      本系統僅供投資追蹤與風險提示，不構成買賣建議，不得自動下單，所有決策需人工確認。
    </footer>

    <script src="data/stocks-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
